name: Validate AOT compatibility

on:
  push:
    branches: [ 'main*' ]
    paths-ignore:
    - '**.md'
  pull_request:
    branches: [ 'main*' ]
    paths-ignore:
    - '**.md'

jobs:
  aot-test:
    name: AOT smoke (${{ matrix.tfm }}, ${{ matrix.runner.name }})
    strategy:
      fail-fast: false
      matrix:
        tfm: [ 'net9.0', 'net10.0' ]
        runner:
        - name: Windows x64
          os: windows-latest
        - name: Windows arm64
          os: windows-11-arm
        - name: Linux x64
          os: ubuntu-latest
        - name: Linux arm64
          os: ubuntu-24.04-arm
        - name: macOS x64
          os: macos-15-intel
        - name: macOS arm64
          os: macos-latest
    runs-on: ${{ matrix.runner.os }}
    # determine dotnet SDK version from the TFM (job-level env to avoid schema ambiguity)
    env:
      DOTNET_VERSION: ${{ matrix.tfm == 'net10.0' && '10.0.x' || '9.0.x' }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # fetching all

    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Display runner architecture
      shell: pwsh
      run: |
        dotnet --info
        [System.Runtime.InteropServices.RuntimeInformation]::ProcessArchitecture
        [System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture

    - name: Verify Python for WebAssembly tools
      if: runner.os == 'Linux'
      shell: pwsh
      run: python3 --version

    - name: Setup Node for Playwright browser install
      if: runner.os == 'Linux'
      uses: actions/setup-node@v4
      with:
        node-version: 24.x

    - name: Install Chromium for AOT browser smoke
      if: runner.os == 'Linux'
      shell: pwsh
      run: npx --yes playwright@1.60.0 install --with-deps --no-shell chromium

    - name: Restore WebAssembly workloads
      shell: pwsh
      run: dotnet workload restore AotCompatibility.TestApp/AotCompatibility.TestApp.csproj

    - name: Publish AOT smoke app, assert static analysis warning count, and browser-smoke the app
      shell: pwsh
      run: ./test-aot-compatibility.ps1 -frameworks "${{ matrix.tfm }}"
