name: Build and Test Template

on:
  workflow_call:
    inputs:
      configuration:
        required: false
        type: string
        default: Release

env:
  COVERAGE_THRESHOLD: 0
  TESTINGPLATFORM_EXITCODE_IGNORE: 8

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
            11.0.100-preview.6.26359.118

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Restore WebAssembly workloads
        run: dotnet workload restore NTComponents.slnx

      - name: Restore dependencies
        run: dotnet restore NTComponents.slnx

      - name: Install node dependencies
        run: npm ci

      - name: Build TypeScript modules
        run: npm run build:ts

      - name: Build
        run: dotnet build NTComponents.slnx --no-restore --configuration ${{ inputs.configuration }}

  dotnet-test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ntcomponents-net9
            project: Tests/NTComponents.Tests/NTComponents.Tests.csproj
            framework: net9.0
            install-playwright: false
          - name: ntcomponents-net10
            project: Tests/NTComponents.Tests/NTComponents.Tests.csproj
            framework: net10.0
            install-playwright: false
          - name: ntcomponents-net11
            project: Tests/NTComponents.Tests/NTComponents.Tests.csproj
            framework: net11.0
            install-playwright: false
          - name: ntcomponents-integration-net9
            project: Tests/NTComponents.IntegrationTests/NTComponents.IntegrationTests.csproj
            framework: net9.0
            install-playwright: true
          - name: ntcomponents-integration-net10
            project: Tests/NTComponents.IntegrationTests/NTComponents.IntegrationTests.csproj
            framework: net10.0
            install-playwright: true
          - name: ntcomponents-integration-net11
            project: Tests/NTComponents.IntegrationTests/NTComponents.IntegrationTests.csproj
            framework: net11.0
            install-playwright: true
          - name: analyzers-net10
            project: Tests/NTComponents.Analyzers.Tests/NTComponents.Analyzers.Tests.csproj
            framework: net10.0
            install-playwright: false
          - name: mcp-net10
            project: Tests/NTComponents.MCP.Tests/NTComponents.MCP.Tests.csproj
            framework: net10.0
            install-playwright: false
          - name: mcp-integration-net10
            project: Tests/NTComponents.MCP.IntegrationTests/NTComponents.MCP.IntegrationTests.csproj
            framework: net10.0
            install-playwright: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
            11.0.100-preview.6.26359.118

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Restore WebAssembly workloads
        run: dotnet workload restore NTComponents.slnx

      - name: Restore dependencies
        run: dotnet restore NTComponents.slnx

      - name: Install node dependencies
        run: npm ci

      - name: Build TypeScript modules
        run: npm run build:ts

      - name: Build test project
        run: dotnet build ${{ matrix.project }} --no-restore --configuration ${{ inputs.configuration }} --framework ${{ matrix.framework }}

      - name: Ensure browsers are installed
        if: matrix.install-playwright
        run: pwsh Tests/NTComponents.IntegrationTests/bin/${{ inputs.configuration }}/${{ matrix.framework }}/playwright.ps1 install --with-deps

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Run .NET tests with coverage
        run: dotnet-coverage collect --output ./TestResults/${{ matrix.name }}.cobertura.xml --output-format cobertura dotnet test ${{ matrix.project }} --no-build --configuration ${{ inputs.configuration }} --framework ${{ matrix.framework }} --results-directory ./TestResults -v minimal

      - name: Upload coverage shard
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.name }}
          path: ./TestResults/${{ matrix.name }}.cobertura.xml

  node-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install node dependencies
        run: npm ci

      - name: Run node tests
        run: npm test

  coverage-report:
    needs: dotnet-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 11.0.100-preview.6.26359.118

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Download coverage shards
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: ./TestResults
          merge-multiple: true

      - name: Merge coverage
        shell: pwsh
        run: |
          $coverageFiles = Get-ChildItem ./TestResults -Filter *.cobertura.xml | ForEach-Object { $_.FullName }
          dotnet-coverage merge @coverageFiles --output ./TestResults/coverage.cobertura.xml --output-format cobertura

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ./TestResults

      - name: Post coverage summary to PR
        if: github.event_name == 'pull_request'
        uses: 5monkeys/cobertura-action@v14
        with:
          path: ./TestResults/coverage.cobertura.xml
          minimum_coverage: ${{ env.COVERAGE_THRESHOLD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          fail_below_threshold: true
          show_line: true
          show_class_names: true
          only_changed_files: true

  build-test-pack:
    needs:
      - build
      - dotnet-test
      - node-test
      - coverage-report
    runs-on: ubuntu-latest
    steps:
      - name: Build, test, and coverage succeeded
        run: echo "Build, parallel .NET tests, node tests, and coverage completed successfully."
