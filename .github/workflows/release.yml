name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  TESTINGPLATFORM_EXITCODE_IGNORE: 8

jobs:
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
          submodules: recursive

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
            11.0.100-preview.6.26359.118

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Restore WebAssembly workloads
        run: dotnet workload restore NTComponents.slnx

      - name: Restore dependencies
        run: dotnet restore NTComponents.slnx

      - name: Install node dependencies
        run: npm ci

      - name: Build TypeScript modules
        run: npm run build:ts:release

      - name: Build
        run: dotnet build NTComponents.slnx --no-restore --configuration Release

      - name: Ensure browsers are installed
        run: pwsh Tests/NTComponents.IntegrationTests/bin/Release/net10.0/playwright.ps1 install --with-deps

      - name: Run .NET tests
        run: dotnet test NTComponents.slnx --no-restore --configuration Release --results-directory ./TestResults -v minimal

      - name: Run node tests
        run: npm test

      - name: Check if commit has a stable release tag
        id: check-tags
        run: |
          git fetch --tags
          if git tag --points-at HEAD | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "is_tagged=true" >> $GITHUB_OUTPUT
          else
            echo "is_tagged=false" >> $GITHUB_OUTPUT
          fi

      - name: Install semantic-release
        if: steps.check-tags.outputs.is_tagged == 'false'
        run: |
          npm install --no-save semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/github conventional-changelog-conventionalcommits

      - name: Validate NuGet API key
        if: steps.check-tags.outputs.is_tagged == 'false'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY secret is missing or unavailable to this workflow."
            exit 1
          fi

      - name: Publish stable release
        if: steps.check-tags.outputs.is_tagged == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch --tags
          npx semantic-release

      - name: Resolve stable package version
        id: release-version
        if: steps.check-tags.outputs.is_tagged == 'false'
        run: |
          set -euo pipefail
          git fetch --tags
          release_tag=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)
          if [ -z "$release_tag" ]; then
            echo "No stable release tag found on this commit."
            exit 1
          fi
          echo "version=${release_tag#v}" >> $GITHUB_OUTPUT

      - name: Pack NuGet packages
        if: steps.check-tags.outputs.is_tagged == 'false'
        run: |
          set -euo pipefail
          rm -rf ./artifacts/nuget
          mkdir -p ./artifacts/nuget
          dotnet pack ./NTComponents/NTComponents.csproj --no-build --configuration Release --output ./artifacts/nuget /p:PackageVersion=${{ steps.release-version.outputs.version }}
          dotnet pack ./NTComponents.AspNetCore/NTComponents.AspNetCore.csproj --no-build --configuration Release --output ./artifacts/nuget /p:PackageVersion=${{ steps.release-version.outputs.version }}
          dotnet pack ./NTComponents.Extensions/NTComponents.Extensions.csproj --no-build --configuration Release --output ./artifacts/nuget /p:PackageVersion=${{ steps.release-version.outputs.version }}
          dotnet pack ./NTComponents.Analyzers/NTComponents.Analyzers.csproj --no-build --configuration Release --output ./artifacts/nuget /p:PackageVersion=${{ steps.release-version.outputs.version }}

      - name: Verify analyzer package
        if: steps.check-tags.outputs.is_tagged == 'false'
        run: pwsh ./test-analyzer-package.ps1 -PackagePath "./artifacts/nuget/NTComponents.Analyzers.${{ steps.release-version.outputs.version }}.nupkg"

      - name: Publish NuGet packages
        if: steps.check-tags.outputs.is_tagged == 'false'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push ./artifacts/nuget/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Unlist older prerelease packages
        if: steps.check-tags.outputs.is_tagged == 'false'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          git fetch --tags
          release_tag=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)
          if [ -z "$release_tag" ]; then
            echo "No stable release tag found on this commit; skipping prerelease unlist."
            exit 0
          fi
          release_version="${release_tag#v}"
          python3 - "$release_version" <<'PY' > prerelease-versions-to-unlist.txt
          import json
          import sys
          import urllib.request

          release = tuple(int(part) for part in sys.argv[1].split("."))
          packages = ("NTComponents", "NTComponents.AspNetCore", "NTComponents.Extensions", "NTComponents.Analyzers")

          def prerelease_is_lower(version):
              version_without_build = version.split("+", 1)[0]
              if "-" not in version_without_build:
                  return False
              core = version_without_build.split("-", 1)[0]
              try:
                  core_parts = tuple(int(part) for part in core.split("."))
              except ValueError:
                  return False
              return core_parts <= release

          for package in packages:
              url = f"https://api.nuget.org/v3-flatcontainer/{package.lower()}/index.json"
              with urllib.request.urlopen(url) as response:
                  versions = json.load(response)["versions"]
              for version in versions:
                  if prerelease_is_lower(version):
                      print(f"{package} {version}")
          PY
          if [ ! -s prerelease-versions-to-unlist.txt ]; then
            echo "No prerelease packages older than $release_version were found."
            exit 0
          fi
          while read -r package version; do
            echo "Unlisting $package $version"
            dotnet nuget delete "$package" "$version" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --non-interactive
          done < prerelease-versions-to-unlist.txt

      - name: Delete stable tag on failure
        if: failure() && steps.check-tags.outputs.is_tagged == 'false'
        run: |
          set -euo pipefail
          git fetch --tags
          tags=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)
          if [ -z "$tags" ]; then
            echo "No stable release tag found on this commit."
            exit 0
          fi
          for tag in $tags; do
            echo "Deleting failed stable release tag $tag"
            git tag -d "$tag" || true
            git push origin ":refs/tags/$tag"
          done

  update-analyzer-release-tracking:
    needs: publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 11.0.100-preview.6.26359.118

      - name: Resolve stable release version
        id: release-version
        run: |
          set -euo pipefail
          git fetch --tags
          release_tag=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)
          if [ -z "$release_tag" ]; then
            echo "No stable release tag found on this commit; skipping analyzer release tracking."
            echo "version=" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "version=${release_tag#v}" >> $GITHUB_OUTPUT

      - name: Promote analyzer release tracking
        if: steps.release-version.outputs.version != ''
        run: pwsh ./promote-analyzer-release.ps1 -Version "${{ steps.release-version.outputs.version }}"

      - name: Detect analyzer release tracking changes
        id: tracking-changes
        if: steps.release-version.outputs.version != ''
        run: |
          if git diff --quiet -- NTComponents.Analyzers/AnalyzerReleases.Shipped.md NTComponents.Analyzers/AnalyzerReleases.Unshipped.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Validate analyzer release tracking
        if: steps.tracking-changes.outputs.changed == 'true'
        run: dotnet build ./NTComponents.Analyzers/NTComponents.Analyzers.csproj --configuration Release

      - name: Commit analyzer release tracking
        if: steps.tracking-changes.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.release-version.outputs.version }}
        run: |
          set -euo pipefail
          branch="chore/analyzer-release-$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add NTComponents.Analyzers/AnalyzerReleases.Shipped.md NTComponents.Analyzers/AnalyzerReleases.Unshipped.md
          git commit -m "chore(analyzers): record release $VERSION"
          git fetch origin "+refs/heads/$branch:refs/remotes/origin/$branch" || true
          git push --force-with-lease origin "HEAD:refs/heads/$branch"

      - name: Open analyzer release tracking pull request
        if: steps.tracking-changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release-version.outputs.version }}
        run: |
          set -euo pipefail
          branch="chore/analyzer-release-$VERSION"
          existing_pr=$(gh pr list --head "$branch" --state open --json url --jq '.[0].url')
          if [ -n "$existing_pr" ]; then
            echo "Analyzer release tracking PR already exists: $existing_pr"
            exit 0
          fi
          gh pr create --base main --head "$branch" --title "chore(analyzers): record release $VERSION" --body "Promotes the shipped analyzer rules for $VERSION and resets the unshipped release file."

